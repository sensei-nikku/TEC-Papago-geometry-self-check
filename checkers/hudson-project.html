<body>
<header class="hdr">
  <div class="hdr-left"><a class="hdr-back" href="../index.html">&larr; All Checkers</a><h1>Miracle on the Hudson</h1><div class="sub">Trig Project — Answer Checker</div></div>

<main class="main" id="main"></main>

<script src="../js/checker-kit.js"></script>
<script src="../js/tool-label.js"></script>
<script src="../js/tool-solve.js"></script>
<script src="../js/fig-triangle.js"></script>
<script src="../js/tool-orient.js"></script>
<script src="../js/fig-orientations.js"></script>
<script>
var RATIOS = ['SIN','COS','TAN'];
var INV    = ['SIN\u207B\u00B9','COS\u207B\u00B9','TAN\u207B\u00B9'];

K.run([
  // STAGE 1 — THE ASCENT
  { id:'q1', num:'Q1',
    prompt:'The plane ascended at 7.7\u00B0 and had traveled 4 miles (21,120 ft) along its flight path when it struck the birds. How high above the ground was it?',
    pipeline:[
      { tool:'orient', label:'Step 1 \u2014 Orient the triangle',
        prompt:'The plane climbs from the ground, up and to the right. The right angle sits where the height drops straight down to the ground \u2014 directly below the plane. Pick that orientation.',
        candidates: figOrientations(), ch:5862169 },
      Object.assign({ tool:'label', label:'Step 2 \u2014 Set up the triangle' },
        figTriangle({ type:'elev', ratio:'sin', R:[255,175], LOW:[70,175], HIGH:[255,60] })),
      { tool:'choice', label:'Step 3 \u2014 Which ratio?', ask:'You have the hypotenuse (path) and want the opposite (height). Which ratio?', options:RATIOS, ch:193469871 },
      { tool:'solve', label:'Step 4 \u2014 Isolate x',
        start:'sin(7.7\u00B0) = x / 21120',
        moves:[ { ask:'x is multiplied by 1/21120. Which operation frees it?',
                  opCh:177788, valCh:195264251,
                  then:'21120 \u00B7 sin(7.7\u00B0) = x' } ] },
      { tool:'numeric', label:'Step 5 \u2014 Calculator form', answer:2829.8, tol:15, unit:'ft' }
  ]},
  { id:'q2', num:'Q2',
    prompt:'It then climbed at 2\u00B0 to a maximum altitude of 3,060 ft. Subtract your Q1 height from 3,060 ft to get the extra altitude climbed, then find how far the plane traveled during that climb.',
    pipeline:[
      { tool:'orient', label:'Step 1 \u2014 Orient the triangle',
        prompt:'The plane keeps climbing, up and to the right. The right angle sits directly below the plane, where its height meets the ground \u2014 bottom-right. Pick that orientation.',
        candidates: figOrientations(), ch:5862169 },
      Object.assign({ tool:'label', label:'Step 2 \u2014 Set up the triangle' },
        figTriangle({ type:'elev', ratio:'sin', R:[255,175], LOW:[70,175], HIGH:[255,60] })),
      { tool:'choice', label:'Step 3 \u2014 Which ratio?', ask:'You have the opposite (extra altitude) and the angle, and want the hypotenuse (distance). Which ratio?', options:RATIOS, ch:193469871 },
      { tool:'solve', label:'Step 4 \u2014 Isolate d (it\u2019s in the denominator)',
        start:'sin(2\u00B0) = 230.2 / d',
        moves:[ { ask:'d is in the denominator. Which operation lifts it out?',
                  opCh:177788, valCh:177673,
                  then:'d \u00B7 sin(2\u00B0) = 230.2' },
                { ask:'Now d is multiplied by sin(2\u00B0). Which operation frees it?',
                  opCh:177788, valCh:2109679585,
                  then:'d = 230.2 / sin(2\u00B0)' } ] },
      { tool:'numeric', label:'Step 5 \u2014 Calculator form', answer:6596, tol:250, unit:'ft' }
  ]},
  // STAGE 2 — THE DESCENT
  { id:'q3', num:'Q3',
    prompt:'The plane dropped 1,390 ft while covering 0.5 miles horizontally.',
    pipeline:[
      { tool:'choice', label:'Compare', ask:'Was the actual distance traveled greater than, less than, or equal to 0.5 miles?',
        options:['Greater than 0.5 miles','Less than 0.5 miles','Equal to 0.5 miles'], ch:1846527719 }
  ]},
  { id:'q4', num:'Q4',
    prompt:'You said the flight path was longer than 0.5 miles. How do you know?',
    pipeline:[
      { tool:'choice', label:'Reason', ask:'Pick the reason.',
        options:['The hypotenuse is always longer than either leg','The angle was steep so it went farther','The plane was moving fast'], ch:173942290 }
  ]},
  { id:'q5', num:'Q5',
    prompt:'The plane dropped 1,390 ft over a horizontal distance of 0.5 miles (2,640 ft). At what angle did it descend?',
    pipeline:[
      { tool:'orient', label:'Step 1 \u2014 Orient the triangle',
        prompt:'The plane descends to the right. Its angle of decline sits OUTSIDE the triangle \u2014 off the horizontal at the high point, top-left. The triangle drops straight down on the left, then runs across the bottom to the target; the right angle is the foot, bottom-left. Pick that orientation.',
        candidates: figOrientations(), ch:5862163 },
      Object.assign({ tool:'label', label:'Step 2 \u2014 Set up the triangle' },
        figTriangle({ type:'depr', ratio:'tan', R:[70,175], LOW:[255,175], HIGH:[70,60] })),
      { tool:'choice', label:'Step 3 \u2014 Which function?', ask:'You have the opposite (1,390) and adjacent (2,640) and need the angle. Which inverse?', options:INV, ch:236465020 },
      { tool:'solve', label:'Step 4 \u2014 Isolate \u03B8',
        start:'tan(\u03B8) = 1390 / 2640',
        moves:[ { ask:'\u03B8 is wrapped inside tan. Which operation frees it?',
                  opCh:193762655,
                  then:'\u03B8 = tan\u207B\u00B9(1390 / 2640)' } ] },
      { tool:'numeric', label:'Step 5 \u2014 Calculator form', answer:27.77, tol:0.5, unit:'\u00B0' }
  ]},
  // STAGE 3 — THE APPROACH
  { id:'q6', num:'Q6',
    prompt:'The plane leveled to a 3\u00B0 descent for the next 2 miles (10,560 ft). How many feet did it drop in altitude?',
    pipeline:[
      { tool:'orient', label:'Step 1 \u2014 Orient the triangle',
        prompt:'Still gliding down to the right from its high point on the left. The angle of decline sits OUTSIDE the triangle, off the horizontal at the top. The triangle drops down on the left and runs across the bottom; the right angle is the foot, bottom-left. Pick that orientation.',
        candidates: figOrientations(), ch:5862163 },
      Object.assign({ tool:'label', label:'Step 2 \u2014 Set up the triangle' },
        figTriangle({ type:'depr', ratio:'tan', R:[70,175], LOW:[255,175], HIGH:[70,60] })),
      { tool:'choice', label:'Step 3 \u2014 Which ratio?', ask:'You have the adjacent (distance) and the angle, and want the opposite (altitude drop). Which ratio?', options:RATIOS, ch:193470696 },
      { tool:'solve', label:'Step 4 \u2014 Isolate x',
        start:'tan(3\u00B0) = x / 10560',
        moves:[ { ask:'x is multiplied by 1/10560. Which operation frees it?',
                  opCh:177788, valCh:194046881,
                  then:'10560 \u00B7 tan(3\u00B0) = x' } ] },
      { tool:'numeric', label:'Step 5 \u2014 Calculator form', answer:553.4, tol:10, unit:'ft' }
  ]},
  { id:'q7', num:'Q7',
    prompt:'The GW Bridge is 6 miles (31,680 ft) from where the plane landed on the Hudson (altitude 0). Descending at 2\u00B0, how high was the plane when it passed over the bridge?',
    pipeline:[
      { tool:'orient', label:'Step 1 \u2014 Orient the triangle',
        prompt:'Coming down to the right toward the bridge from its high point on the left. The angle of decline sits OUTSIDE the triangle, off the horizontal at the top. The triangle drops down on the left and runs across the bottom; the right angle is the foot, bottom-left. Pick that orientation.',
        candidates: figOrientations(), ch:5862163 },
      Object.assign({ tool:'label', label:'Step 2 \u2014 Set up the triangle' },
        figTriangle({ type:'depr', ratio:'tan', R:[70,175], LOW:[255,175], HIGH:[70,60] })),
      { tool:'choice', label:'Step 3 \u2014 Which ratio?', ask:'You have the adjacent (distance) and the angle, and want the opposite (height). Which ratio?', options:RATIOS, ch:193470696 },
      { tool:'solve', label:'Step 4 \u2014 Isolate x',
        start:'tan(2\u00B0) = x / 31680',
        moves:[ { ask:'x is multiplied by 1/31680. Which operation frees it?',
                  opCh:177788, valCh:196455815,
                  then:'31680 \u00B7 tan(2\u00B0) = x' } ] },
      { tool:'numeric', label:'Step 5 \u2014 Calculator form', answer:1106.3, tol:15, unit:'ft' }
  ]},
  { id:'q8', num:'Q8',
    prompt:'The George Washington Bridge is 212 ft tall. Using your Q7 height, by how many feet did the plane clear the bridge?',
    pipeline:[
      { tool:'numeric', label:'Clearance = Q7 height \u2212 212 ft', answer:894.3, tol:30, unit:'ft' }
  ]}
]);
</script>
